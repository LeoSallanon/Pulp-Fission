<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prototype tactique 4x4</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <h1>Prototype tactique 4x4</h1>
        <button id="new-game-btn" type="button">Nouvelle partie</button>
      </header>

      <section class="battle-layout">
        <aside class="left-rail">
          <section class="hud-panel round-panel">
            <h2>Round</h2>
            <p id="round-label" class="round-value">1</p>
          </section>

          <section class="hud-panel status-panel" id="status-panel">
            <h2>Initiative</h2>
            <div><strong>Phase:</strong> <span id="phase-label"></span></div>
            <div><strong>Activation:</strong> <span id="activation-label"></span></div>
            <div><strong>Jetons spéciaux:</strong> <span id="special-token-label"></span></div>
            <div class="winner" id="winner-label"></div>
          </section>
        </aside>

        <section class="center-stage">
          <section class="board-lane board-lane-ai">
            <div class="lane-header">IA</div>
            <div class="board-shell">
              <div class="reserve" id="ai-reserve">
                <h2>Réserve IA</h2>
                <div class="reserve-list" id="ai-reserve-list"></div>
              </div>
              <div class="board-block">
                <h2>Grille IA (haut)</h2>
                <div class="grid" id="ai-grid"></div>
              </div>
            </div>
          </section>

          <section class="board-lane board-lane-player">
            <div class="lane-header">Joueur</div>
            <div class="board-shell">
              <div class="reserve" id="player-reserve">
                <h2>Réserve Joueur</h2>
                <div class="reserve-list" id="player-reserve-list"></div>
              </div>
              <div class="board-block">
                <h2>Grille Joueur (bas)</h2>
                <div class="grid" id="player-grid"></div>
              </div>
            </div>
          </section>
        </section>

        <aside class="right-rail">
          <section class="hud-panel reserve-common">
            <h2>Réserve commune</h2>
            <div class="reserve-common-value"><span id="special-token-label-right">--</span> jeton(x)</div>
          </section>

          <section class="hud-panel controls" id="controls">
            <h2>Action joueur</h2>
            <p id="control-hint"></p>
            <div class="action-buttons">
              <button id="move-skip-btn" class="btn-action btn-move" type="button">Rester sur place</button>
              <button id="normal-action-btn" class="btn-action btn-attack" type="button">Attaque normale</button>
              <button id="special-action-btn" class="btn-action btn-special" type="button">Coup spécial</button>
              <button id="pass-action-btn" class="btn-action btn-pass" type="button">Passer</button>
            </div>
          </section>

          <section class="hud-panel log-panel">
            <h2>Log de combat</h2>
            <ol id="combat-log"></ol>
          </section>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
